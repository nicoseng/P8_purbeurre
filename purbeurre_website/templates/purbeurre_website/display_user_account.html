{% extends 'purbeurre_website/base.html' %}

{% block content %}
{% load static %}
<body id="page-top" xmlns="http://www.w3.org/1999/html">

<!-- Masthead-->
<header class="masthead">
    <div class="container px-4 px-lg-5 h-100">
        <div class="row gx-4 gx-lg-5 h-100 align-items-center justify-content-center text-center">
            <div class="col-lg-8 align-self-end">
                <h1 class="text-white font-weight-bold">Mon compte</h1>
                <hr class="divider"/>
            </div>
        </div>
    </div>
</header>
<!-- section mail-->
<section>
    <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-lg-4 text-center mb-5 mb-lg-0">
            {% for message in messages %}
            <p id="messages" class="text-white">{{ message }}</p>
            {% endfor %}
            <i class="bi-envelope fs-2 mb-3 text-muted"></i>
            <p>Votre mail :</p>
            <div>abc@mail.com</div>
        </div>
    </div>
</section>
<!-- Footer-->
<footer class="bg-light py-5">
    <div class="container px-4 px-lg-5">
        <div class="small text-center text-muted">Copyright &copy; 2022 - Pur Beurre</div>
    </div>
</footer>
<!-- Bootstrap core JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- SimpleLightbox plugin JS-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/SimpleLightbox/2.1.0/simpleLightbox.min.js"></script>
<!-- Core theme JS-->
<script src="{% static 'js/script.js' %}"></script>
<script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
</body>
{% endblock %}
