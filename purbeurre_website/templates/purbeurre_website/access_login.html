{% extends 'purbeurre_website/base.html' %}

{% block content %}
{% load static %}
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" integrity="sha384-gfdkjb5BdAXd+lj+gudLWI+BXq4IuLW5IT+brZEZsLFm++aCMlF1V92rMkPaX4PP" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/account_style.css'%}">

<body id="page-top" xmlns="http://www.w3.org/1999/html">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" id="mainNav">
            <div class="container px-4 px-lg-5">


                <a class="navbar-brand" href="../welcome"><img src="{% static 'images/pur_beurre_logo.png' %}" alt="pur_beurre_logo">Pur Beurre</a>
                <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto my-2 my-lg-0">
                        <li class="nav-item"><a class="nav-link" href="#recherche"><input type="search" class="form-control rounded" placeholder="Recherche" aria-label="rehercher" aria-describedby="search-addon" /></a></li>
                        <li class="nav-item"><a class="nav-link" href="../check_my_account"><img src="{% static 'images/user.png' %}" alt="user_icon"></a></li>
                        <li class="nav-item"><a class="nav-link" href="../display_results"><img src="{% static 'images/carrot.png' %}" alt="carrot_icon"></a></li>
                        <li class="nav-item"><a class="nav-link" href="#page-top"><img src="{% static 'images/logout.png' %}" alt="logout_icon"></a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- Masthead-->
        <header class="masthead">
            <div class="container px-4 px-lg-5 h-100">
                <div class="row gx-4 gx-lg-5 h-100 align-items-center justify-content-center text-center">
                    <div class="col-lg-8 align-self-half">
                        <h1 class="text-white font-weight-bold">Se connecter</h1>
                        <hr class="divider" />
                    </div>
                </div>
            </div>
        </header>

        <!-- Login-->
        <div class="container h-100">
		    <div class="d-flex justify-content-center h-100">
			    <div class="user_card">
				    <div class="d-flex justify-content-center">


					<h3 id="form-title">Login</h3>
				    </div>

                    <div class="d-flex justify-content-center form_container">
					    <form method="POST" action="">
                            {% csrf_token %}
						    <div class="input-group mb-3">
							    <div class="input-group-append">
								    <span class="input-group-text"><i class="fas fa-user"></i></span>
							    </div>
							    <input type="text" name="username" placeholder="Nom d'utilisateur..." class="form-control">
						    </div>
						    <div class="input-group mb-2">
							    <div class="input-group-append">
								    <span class="input-group-text"><i class="fas fa-key"></i></span>
							    </div>
								    <input type="password" name="password" placeholder="Mot de passe..." class="form-control" >
						    </div>

							    <div class="d-flex justify-content-center mt-3 login_container">
				 				    <input class="btn login_btn" type="submit" value="Connexion">
				   			    </div>
					    </form>

				    </div>
                    {% for message in messages %}

                    <p id="messages" class="text_align-center">{{ message }}</p>

                    {% endfor %}
				    <div class="mt-4">
					    <div class="d-flex justify-content-center links">
						    Vous n'avez pas de compte ?<a href="{% url 'create_account' %}" class="ml-2">S'inscrire</a>
					    </div>

				    </div>
			    </div>
		    </div>
	    </div>
        <!-- Login-->

        <!-- Footer-->
        <footer class="bg-light py-5">
            <div class="container px-4 px-lg-5"><div class="small text-center text-muted">Copyright &copy; 2022 - Pur Beurre</div></div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- SimpleLightbox plugin JS-->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/SimpleLightbox/2.1.0/simpleLightbox.min.js"></script>
        <!-- Core theme JS-->
        <script src="{% static 'js/script.js'%}"></script>
        <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
        <!-- * *                               SB Forms JS                               * *-->
        <!-- * * Activate your form at https://startbootstrap.com/solution/contact-forms * *-->
        <!-- * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * *-->
        <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
	    <script>
						/* Because i didnt set placeholder values in forms.py they will be set here using vanilla Javascript
		//We start indexing at one because CSRF_token is considered and input field
		 */

		//Query All input fields
		let form_fields = document.getElementsByTagName('input')
		form_fields[0].placeholder="Nom d'utilisateur";
		form_fields[1].placeholder='Mot de passe';


		for (let field in form_fields){
			form_fields[field].className += ' form-control'
		}
	    </script>
    </body>
{% endblock %}
