<!DOCTYPE html>
{% load static %}
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Pur Beurre</title>
        <!-- Bootstrap Icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Merriweather+Sans:400,700" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" type="text/css">
        <!-- SimpleLightbox plugin CSS-->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/SimpleLightbox/2.1.0/simpleLightbox.min.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link rel="stylesheet" href="{% static 'css/styles.css'%}">
    </head>

<body>
    <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3" id="mainNav">
            <div class="container px-4 px-lg-5">


                <a class="navbar-brand" href="{% url 'home' %}"><img src="{% static 'images/pur_beurre_logo.png' %}" alt="pur_beurre_logo">Pur Beurre</a>
                <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto my-2 my-lg-0">
                        <li class="nav-item"><a class="nav-link" href="{% url 'display_favourite' %}"><img src="{% static 'images/carrot.png' %}" alt="carrot_icon">Mes produits favoris</a></li>
                        {% if user is None %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'login' %}"><img src="{% static 'images/create_account.png' %}" alt="create_account_icon">Se connecter</a></li>
                        {% else %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'display_user_account' %}"><img src="{% static 'images/my_account.png' %}" alt="my_account_icon">{{user.username}}</a></li>
                        {% endif %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}"><img src="{% static 'images/logout.png' %}" alt="logout_icon">Se déconnecter</a></li>

                    </ul>
                </div>
            </div>
        </nav>
    {% block content %}
    {% endblock %}

</body>

</html>
